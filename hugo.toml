baseURL = 'https://maktabah-al-hamdaniyyah.pages.dev/'
title = 'Maktabah Al-Hamdaniyyah'
theme = "blowfish"

# Pengaturan Bahasa Wajib Blowfish
defaultContentLanguage = "id"

[languages.id]
    languageCode = "id"
    contentDir = "content"
    languageName = "Bahasa Indonesia"
    weight = 1
    # Ini kuncinya, mendefinisikan Locale secara paksa
    [languages.id.params]
        locale = "id"

[params]
    colorScheme = "blowfish"
    defaultAppearance = "dark"
    showRecent = true
    mainSections = ["post"]
    brandColor = "#cc0000"

[[menu.main]]
    name = "Pendidikan"
    url = "/categories/pendidikan"
    weight = 1

[[menu.main]]
    name = "Filosofi"
    url = "/categories/filosofi"
    weight = 2

[[menu.main]]
    name = "Kitab Kuning"
    url = "/categories/kitab-kuning"
    weight = 3